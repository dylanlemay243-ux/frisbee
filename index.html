<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Smart Frisbee Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22c55e">

<link rel="manifest" href="/frisbee/manifest.json">

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/frisbee/service-worker.js");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(160deg,#020617,#0f172a);
color:white;
padding:20px;
}

button{
padding:14px 28px;
margin:8px;
font-size:16px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:#22c55e;
}

.download{
background:#38bdf8;
}

.liveRPM{
font-size:56px;
margin-top:10px;
color:#22c55e;
}

.stats{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:25px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:12px;
width:170px;
}

.cardTitle{
font-size:14px;
color:#94a3b8;
}

.cardValue{
font-size:20px;
margin-top:6px;
}

.chartGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

@media(max-width:700px){
.chartGrid{
grid-template-columns:1fr;
}
}

.historyBox{
margin-top:30px;
background:#1e293b;
padding:15px;
border-radius:12px;
max-width:450px;
margin-left:auto;
margin-right:auto;
height:220px;
overflow-y:auto;
text-align:left;
}

.throwRow{
border-bottom:1px solid #334155;
padding:8px 0;
}

</style>

</head>

<body>

<h1>🥏 Smart Frisbee</h1>

<button onclick="connect()">Connect</button>
<button class="download" onclick="downloadData()">Download Session</button>

<br><br>

<div id="viewer" style="width:100%;height:260px;"></div>

<canvas id="rpmGauge" width="300" height="150"></canvas>

<div class="liveRPM" id="live">-- RPM</div>

<div class="stats">

<div class="card">
<div class="cardTitle">Last Throw</div>
<div class="cardValue" id="last">--</div>
</div>

<div class="card">
<div class="cardTitle">Launch Angle</div>
<div class="cardValue" id="angle">--</div>
</div>

<div class="card">
<div class="cardTitle">Average (5)</div>
<div class="cardValue" id="avg">--</div>
</div>

<div class="card">
<div class="cardTitle">Max Throw</div>
<div class="cardValue" id="max">--</div>
</div>

</div>

<div class="chartGrid">

<div>
<h3>Throw Speed (MPH)</h3>
<canvas id="speedChart"></canvas>
</div>

<div>
<h3>Throw Spin (RPM)</h3>
<canvas id="rpmChart"></canvas>
</div>

</div>

<h2>Throw Replay</h2>

<div id="replay" style="width:100%;height:300px;"></div>

<div id="distance" style="font-size:20px;margin-top:10px;">
Distance: --
</div>

<div class="historyBox" id="history">
<b>Throw History</b>
</div>

<script>

let characteristic;
let throwHistory=[];

let speedChart;
let rpmChart;
let rpmGauge;

let disc;
let spin=0;

let smoothRoll=0;
let smoothPitch=0;

/* ORIENTATION VIEW */

function init3D(){

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/260,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth*0.9,260);

document.getElementById("viewer").appendChild(renderer.domElement);

const geo=new THREE.CylinderGeometry(1,1,0.08,128);

const mat=new THREE.MeshStandardMaterial({
color:0xfacc15,
metalness:0.1,
roughness:0.6
});

disc=new THREE.Mesh(geo,mat);
scene.add(disc);

const rimGeo=new THREE.TorusGeometry(1,0.07,32,128);
const rimMat=new THREE.MeshStandardMaterial({color:0xf59e0b});
const rim=new THREE.Mesh(rimGeo,rimMat);

rim.rotation.x=Math.PI/2;

disc.add(rim);

const markerGeo=new THREE.BoxGeometry(0.15,0.05,0.6);
const markerMat=new THREE.MeshStandardMaterial({color:0x1e293b});
const marker=new THREE.Mesh(markerGeo,markerMat);

marker.position.z=0.7;

disc.add(marker);

scene.add(new THREE.AmbientLight(0xffffff,0.9));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,6,5);
scene.add(light);

camera.position.set(0,2.5,3.5);
camera.lookAt(0,0,0);

function animate(){

requestAnimationFrame(animate);

disc.rotation.x=smoothPitch*1.6;
disc.rotation.z=smoothRoll*1.6;

if(spin>20){
disc.rotation.y+=spin*0.003;
}

renderer.render(scene,camera);

}

animate();

}

/* RPM GAUGE */

function initGauge(){

const opts={
angle:-0.2,
lineWidth:0.2,
pointer:{length:0.6,color:'#22c55e'},
strokeColor:'#1e293b'
};

rpmGauge=new Gauge(document.getElementById("rpmGauge")).setOptions(opts);

rpmGauge.maxValue=450;
rpmGauge.setMinValue(0);
rpmGauge.animationSpeed=32;

}

/* CHARTS */

function initCharts(){

speedChart=new Chart(document.getElementById("speedChart"),{
type:'line',
data:{labels:[],datasets:[{label:"MPH",data:[],borderColor:"#22c55e"}]}
});

rpmChart=new Chart(document.getElementById("rpmChart"),{
type:'line',
data:{labels:[],datasets:[{label:"RPM",data:[],borderColor:"#38bdf8"}]}
});

}

/* THROW REPLAY */

let replayScene;
let replayDisc;
let replayCamera;
let replayRenderer;

function initReplay(){

replayScene = new THREE.Scene();

replayCamera = new THREE.PerspectiveCamera(
60,
window.innerWidth/300,
0.1,
1000
);

replayRenderer = new THREE.WebGLRenderer({antialias:true});
replayRenderer.setSize(window.innerWidth*0.9,300);

document.getElementById("replay")
.appendChild(replayRenderer.domElement);


/* ground */

const groundGeo = new THREE.PlaneGeometry(600,200);
const groundMat = new THREE.MeshStandardMaterial({
color:0x14532d
});

const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
replayScene.add(ground);


/* distance lines */

for(let i=50;i<=400;i+=50){

const lineGeo = new THREE.BoxGeometry(0.3,0.01,200);
const lineMat = new THREE.MeshBasicMaterial({color:0xffffff});

const line = new THREE.Mesh(lineGeo,lineMat);

line.position.x = i*0.3;

replayScene.add(line);

}


/* disc */

const discGeo = new THREE.CylinderGeometry(0.6,0.6,0.08,64);

const discMat = new THREE.MeshStandardMaterial({
color:0xfacc15,
metalness:0.2,
roughness:0.6
});

replayDisc = new THREE.Mesh(discGeo,discMat);

/* keep disc flat */

replayDisc.rotation.x = Math.PI/2;

replayScene.add(replayDisc);


/* lighting */

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,40,10);
replayScene.add(light);

replayScene.add(new THREE.AmbientLight(0xffffff,0.6));


/* camera */

replayCamera.position.set(-10,6,10);
replayCamera.lookAt(0,0,0);

}

/* SIMULATION */

function simulateThrow(speedMPH,rpm){

const speed = speedMPH * 0.447; // m/s

let vx = speed;
let vy = 1.5; // small lift

let x = 0;
let y = 1;

const dt = 0.02;

/* physics tuning */

let drag = 0.015;
let gravity = 9.81;

/* spin adds glide */

let lift = rpm * 0.002;

let path = [];

while(y >= 0){

vx -= drag;
vy -= (gravity - lift) * dt;

x += vx * dt;
y += vy * dt;

path.push({x:x,y:y});

}

function animateThrow(path,rpm){

let i = 0;

let trailPoints = [];

const trailMat = new THREE.LineBasicMaterial({
color:0xffffff
});

function step(){

if(i >= path.length){

/* landing marker */

const markerGeo = new THREE.CylinderGeometry(0.4,0.4,0.05,32);
const markerMat = new THREE.MeshBasicMaterial({color:0xff0000});

const marker = new THREE.Mesh(markerGeo,markerMat);

marker.position.set(
path[path.length-1].x,
0.02,
0
);

replayScene.add(marker);

return;
}

const p = path[i];

/* disc position */

replayDisc.position.x = p.x;
replayDisc.position.y = p.y;

/* correct frisbee spin */

replayDisc.rotation.z += rpm * 0.0006;


/* camera follow */

replayCamera.position.x = p.x - 8;
replayCamera.lookAt(p.x,1,0);


/* flight trail */

trailPoints.push(
new THREE.Vector3(p.x,p.y,0)
);

const trailGeo = new THREE.BufferGeometry()
.setFromPoints(trailPoints);

const trail = new THREE.Line(trailGeo,trailMat);

replayScene.add(trail);


/* render */

replayRenderer.render(replayScene,replayCamera);

i++;

requestAnimationFrame(step);

}

step();

}

init3D();
initGauge();
initCharts();
initReplay();

/* BLE */

async function connect(){

const device=await navigator.bluetooth.requestDevice({
filters:[{name:'SmartFrisbee'}],
optionalServices:['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
});

const server=await device.gatt.connect();

const service=await server.getPrimaryService(
'4fafc201-1fb5-459e-8fcc-c5c9c331914b'
);

characteristic=await service.getCharacteristic(
'beb5483e-36e1-4688-b7f5-ea07361b26a8'
);

await characteristic.startNotifications();

characteristic.addEventListener(
'characteristicvaluechanged',
handleData
);

}

function handleData(event){

let value=new TextDecoder().decode(event.target.value).trim();

const parts=value.split("|");

const rpm=parseFloat(parts[0].split(":")[1]);

document.getElementById("live").innerText=rpm.toFixed(0)+" RPM";

rpmGauge.set(rpm);

spin=rpm;

const tilt=parts[1].split(":")[1].split(",");

const roll=parseFloat(tilt[0])*Math.PI/180;
const pitch=parseFloat(tilt[1])*Math.PI/180;

smoothRoll+=(roll-smoothRoll)*0.35;
smoothPitch+=(pitch-smoothPitch)*0.35;

const throwNum=parseInt(parts[2].split(":")[1]);

if(throwNum>0){

const lastParts=parts[3].split(":")[1].split(",");

const speed=parseFloat(lastParts[0]);
const spinRPM=parseFloat(lastParts[1]);

document.getElementById("last").innerText=
speed.toFixed(1)+" mph / "+spinRPM.toFixed(0)+" rpm";

const angle=parseFloat(parts[4].split(":")[1]);

document.getElementById("angle").innerText=
angle.toFixed(1)+"°";

const avgParts=parts[5].split(":")[1].split(",");

document.getElementById("avg").innerText=
avgParts[0]+" mph / "+avgParts[1]+" rpm";

const maxParts=parts[6].split(":")[1].split(",");

document.getElementById("max").innerText=
maxParts[0]+" mph / "+maxParts[1]+" rpm";

speedChart.data.labels.push("Throw "+throwNum);
speedChart.data.datasets[0].data.push(speed);
speedChart.update();

rpmChart.data.labels.push("Throw "+throwNum);
rpmChart.data.datasets[0].data.push(spinRPM);
rpmChart.update();

const row=document.createElement("div");

row.className="throwRow";

row.innerText="Throw "+throwNum+
" — "+speed.toFixed(1)+" mph / "+
spinRPM.toFixed(0)+" rpm";

document.getElementById("history").appendChild(row);

throwHistory.push({
throw:throwNum,
speed:speed,
rpm:spinRPM
});

function simulateThrow(speedMPH,rpm){

const speed = speedMPH * 0.447;

let vx = speed;
let vy = 1.5;

let x = 0;
let y = 1;

const dt = 0.02;

const drag = 0.02;
const gravity = 9.81;

const lift = rpm * 0.002;

let path = [];

while(y >= 0){

vx -= drag;
vy -= (gravity - lift) * dt;

x += vx * dt;
y += vy * dt;

path.push({x:x,y:y});

}

animateThrow(path,rpm);

document.getElementById("distance").innerText =
"Distance: "+(x*3.28).toFixed(0)+" ft";

}

</script>

</body>
</html>
