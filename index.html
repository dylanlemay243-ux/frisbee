<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Smart Frisbee Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/frisbee/manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.stats{
display:flex;
gap:20px;
justify-content:center;
margin-top:20px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
width:160px;
}

.chartGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

@media(max-width:700px){
.chartGrid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<h1>🥏 Smart Frisbee</h1>

<button onclick="connect()">Connect</button>

<div id="viewer" style="width:100%;height:260px;"></div>

<h2 id="live">-- RPM</h2>

<div class="stats">

<div class="card">
Last Throw
<div id="last">--</div>
</div>

<div class="card">
Launch Angle
<div id="angle">--</div>
</div>

<div class="card">
Average (5)
<div id="avg">--</div>
</div>

<div class="card">
Max
<div id="max">--</div>
</div>

</div>

<script>

let disc;
let spin=0;

let smoothRoll=0;
let smoothPitch=0;

function init3D(){

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/260,0.1,1000);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth*0.9,260);

document.getElementById("viewer").appendChild(renderer.domElement);

const geometry=new THREE.CylinderGeometry(1,1,0.08,128);
const material=new THREE.MeshStandardMaterial({color:0xff6a00});

disc=new THREE.Mesh(geometry,material);
scene.add(disc);

const rimGeo=new THREE.TorusGeometry(1,0.07,32,128);
const rimMat=new THREE.MeshStandardMaterial({color:0xff5500});
const rim=new THREE.Mesh(rimGeo,rimMat);
rim.rotation.x=Math.PI/2;
disc.add(rim);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(4,5,5);
scene.add(light);

const ambient=new THREE.AmbientLight(0xffffff,0.8);
scene.add(ambient);

camera.position.set(0,1.5,3);
camera.lookAt(0,0,0);

function animate(){

requestAnimationFrame(animate);

disc.rotation.x = smoothPitch;
disc.rotation.z = smoothRoll;

if(spin>20)
disc.rotation.y += spin*0.002;

renderer.render(scene,camera);

}

animate();

}

init3D();

async function connect(){

const device=await navigator.bluetooth.requestDevice({
filters:[{name:'SmartFrisbee'}],
optionalServices:['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
});

const server=await device.gatt.connect();

const service=await server.getPrimaryService(
'4fafc201-1fb5-459e-8fcc-c5c9c331914b'
);

const characteristic=await service.getCharacteristic(
'beb5483e-36e1-4688-b7f5-ea07361b26a8'
);

await characteristic.startNotifications();

characteristic.addEventListener(
'characteristicvaluechanged',
handleData
);

}

function handleData(event){

let value=new TextDecoder().decode(event.target.value).trim();

const parts=value.split("|");

const rpm=parseFloat(parts[0].split(":")[1]);

document.getElementById("live").innerText=rpm.toFixed(0)+" RPM";

spin=rpm;

const tilt=parts[1].split(":")[1].split(",");

const roll=parseFloat(tilt[0])*Math.PI/180;
const pitch=parseFloat(tilt[1])*Math.PI/180;

smoothRoll += (roll-smoothRoll)*0.15;
smoothPitch += (pitch-smoothPitch)*0.15;

const throwNum=parseInt(parts[2].split(":")[1]);

if(throwNum>0){

const lastParts=parts[3].split(":")[1].split(",");

document.getElementById("last").innerText=
lastParts[0]+" mph / "+lastParts[1]+" rpm";

document.getElementById("angle").innerText=
parts[4].split(":")[1]+"°";

document.getElementById("avg").innerText=
parts[5].split(":")[1];

document.getElementById("max").innerText=
parts[6].split(":")[1];

}

}

</script>

</body>
</html>
