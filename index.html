<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Smart Frisbee Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#22c55e">

<link rel="manifest" href="/frisbee/manifest.json">

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/frisbee/service-worker.js");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

button{
padding:12px 24px;
margin:8px;
font-size:16px;
border-radius:8px;
border:none;
background:#22c55e;
color:black;
font-weight:bold;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
width:160px;
}

.chartGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;
}

@media(max-width:700px){
.chartGrid{
grid-template-columns:1fr;
}
}

.historyBox{
margin-top:30px;
background:#1e293b;
padding:15px;
border-radius:10px;
max-width:420px;
margin-left:auto;
margin-right:auto;
height:220px;
overflow-y:auto;
text-align:left;
}

</style>
</head>

<body>

<h1>🥏 Smart Frisbee</h1>

<button onclick="connect()">Connect</button>
<button onclick="downloadData()">Download Session</button>

<br><br>

<div id="viewer" style="width:100%;height:260px;"></div>

<canvas id="rpmGauge" width="300" height="150"></canvas>

<h2 id="live">-- RPM</h2>

<div class="stats">

<div class="card">
<div>Last Throw</div>
<div id="last">--</div>
</div>

<div class="card">
<div>Average (5)</div>
<div id="avg">--</div>
</div>

<div class="card">
<div>Max Throw</div>
<div id="max">--</div>
</div>

</div>

<div class="chartGrid">

<div>
<h3>Throw Speed (MPH)</h3>
<canvas id="speedChart"></canvas>
</div>

<div>
<h3>Throw Spin (RPM)</h3>
<canvas id="rpmChart"></canvas>
</div>

</div>

<div class="historyBox" id="history">
<b>Throw History</b>
</div>

<script>

let characteristic;
let throwHistory=[];

let speedChart;
let rpmChart;
let rpmGauge;

let disc;

function init3D(){

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/260,0.1,1000);

const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth*0.9,260);

document.getElementById("viewer").appendChild(renderer.domElement);

const geometry=new THREE.CylinderGeometry(1,1,0.1,64);
const material=new THREE.MeshStandardMaterial({color:0xffcc00});

disc=new THREE.Mesh(geometry,material);
scene.add(disc);

disc.rotation.x=Math.PI/2;

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z=3;

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

}

function initGauge(){

const opts={
angle:-0.2,
lineWidth:0.2,
pointer:{length:0.6,color:'#22c55e'},
strokeColor:'#1e293b'
};

const target=document.getElementById('rpmGauge');

rpmGauge=new Gauge(target).setOptions(opts);
rpmGauge.maxValue=450;
rpmGauge.setMinValue(0);
rpmGauge.animationSpeed=32;

}

function initCharts(){

speedChart=new Chart(document.getElementById("speedChart"),{
type:'line',
data:{labels:[],datasets:[{label:"MPH",data:[],borderColor:"#22c55e"}]}
});

rpmChart=new Chart(document.getElementById("rpmChart"),{
type:'line',
data:{labels:[],datasets:[{label:"RPM",data:[],borderColor:"#38bdf8"}]}
});

}

init3D();
initGauge();
initCharts();

async function connect(){

const device=await navigator.bluetooth.requestDevice({
filters:[{name:'SmartFrisbee'}],
optionalServices:['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
});

const server=await device.gatt.connect();

const service=await server.getPrimaryService(
'4fafc201-1fb5-459e-8fcc-c5c9c331914b'
);

characteristic=await service.getCharacteristic(
'beb5483e-36e1-4688-b7f5-ea07361b26a8'
);

await characteristic.startNotifications();

characteristic.addEventListener(
'characteristicvaluechanged',
handleData
);

}

function handleData(event){

let value=new TextDecoder().decode(event.target.value).trim();

const parts=value.split("|");

const rpm=parseFloat(parts[0].split(":")[1]);

document.getElementById("live").innerText=rpm+" RPM";

rpmGauge.set(rpm);

const tilt=parts[1].split(":")[1].split(",");

const roll=parseFloat(tilt[0])*Math.PI/180;
const pitch=parseFloat(tilt[1])*Math.PI/180;

disc.rotation.z=roll;
disc.rotation.x=Math.PI/2+pitch;

const throwNum=parseInt(parts[2].split(":")[1]);

if(throwNum>0){

const lastParts=parts[3].split(":")[1].split(",");

const speed=parseFloat(lastParts[0]);
const spin=parseFloat(lastParts[1]);

document.getElementById("last").innerText=
speed.toFixed(1)+" mph / "+spin.toFixed(0)+" rpm";

const avgParts=parts[4].split(":")[1].split(",");
document.getElementById("avg").innerText=
avgParts[0]+" mph / "+avgParts[1]+" rpm";

const maxParts=parts[5].split(":")[1].split(",");
document.getElementById("max").innerText=
maxParts[0]+" mph / "+maxParts[1]+" rpm";

speedChart.data.labels.push(throwNum);
speedChart.data.datasets[0].data.push(speed);
speedChart.update();

rpmChart.data.labels.push(throwNum);
rpmChart.data.datasets[0].data.push(spin);
rpmChart.update();

const row=document.createElement("div");
row.innerText="Throw "+throwNum+" — "+speed.toFixed(1)+" mph / "+spin.toFixed(0)+" rpm";
document.getElementById("history").appendChild(row);

throwHistory.push({throw:throwNum,speed:speed,rpm:spin});

}

}

function downloadData(){

let csv="Throw,Speed MPH,RPM\n";

throwHistory.forEach(t=>{
csv+=`${t.throw},${t.speed},${t.rpm}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="frisbee_session.csv";
a.click();

}

</script>

</body>
</html>
